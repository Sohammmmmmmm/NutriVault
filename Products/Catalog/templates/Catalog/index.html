{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriVault</title>
    <link rel="icon" type="image/png" href="{% static 'Catalog/logo.png' %}?v=1">
    <link rel="stylesheet" href="{% static 'Catalog/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar d-flex justify-content-center align-items-center gap-5 py-4 position-relative w-100">
    
    <a href="/" class="position-absolute start-0 ps-4">
        <img src="{% static 'Catalog/logo.png' %}" alt="Brand Logo" height="65">
    </a>
    
    <a href="{% url 'about' %}">About</a>
    <a href="{% url 'products' %}">Products</a>
    <a href="{% url 'contact' %}">Contact</a>

    <div class="position-absolute end-0  d-flex gap-4 pe-4">
    <a href="{% url 'Login' %}">login</a>
    <a href="{% url 'SignUp' %}">signUp</a>
    </div>

</nav>
{% if messages %}
    {% for message in messages %}
        <div class="toast align-items-center text-white {% if message.tags == 'error' %}bg-danger{% else %}bg-success{% endif %} border-0 show" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="d-flex">
                <div class="toast-body fw-bold">
                    {% if message.tags == 'error' %}{% else %}{% endif %} {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    {% endfor %}
{% endif %}

<main class="container my-4">
        {% block content %}
        
        {% endblock %}
    </main>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
