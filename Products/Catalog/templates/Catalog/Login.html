{% extends "Catalog/index.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    
    <div id="login-card" class="card p-4 shadow w-100" style="max-width: 400px; border-radius: 12px; border: none; background-color: #F8F9FA; opacity: 0;">
        
        <h2 class="fw-bold text-center mb-4 text-dark">Login</h2>
        
        <form method="post" action="">
            {% csrf_token %}
            
            <div class="mb-3 animate-field">
                <label for="id_username" class="form-label fw-bold text-secondary text-start d-block">Username</label>
                <input type="text" name="Name" id="id_username" class="form-control py-2" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-4 animate-field">
                <label for="id_password" class="form-label fw-bold text-secondary text-start d-block">Password</label>
                <input type="password" name="Password" id="id_password" class="form-control py-2" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn bg-success text-white w-100 fw-bold py-2 shadow-sm animate-field">
                Log In
            </button>
            
            <div class="text-center mt-3 animate-field">
                <small class="text-muted">Don't have an account? <a href="{% url 'SignUp' %}" class="text-success fw-bold text-decoration-none">Sign Up</a></small>
            </div>
        </form>
        
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let tl = gsap.timeline();

        tl.fromTo("#login-card", 
            { y: 50, opacity: 0 }, 
            { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" }
        );

        tl.fromTo(".animate-field", 
            { y: 15, opacity: 0 }, 
            { y: 0, opacity: 1, duration: 0.5, ease: "power2.out", stagger: 0.1 },
            "-=0.4" 
        );
    });
</script>
{% endblock %}
